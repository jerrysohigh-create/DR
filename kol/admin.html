<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>MAGNE.AI KOL Admin</title><link rel="stylesheet" href="css/admin.css"></head><body><main class="shell admin-shell"><header class="brand"><div class="logo">MAGNE.AI · KOL ADMIN</div><span class="demo">DEMO</span></header><section id="login" class="card login"><h1>Admin sign in</h1><p class="muted">Production uses Supabase Auth. Demo access is local-only.</p><label>Email<input id="email" type="email" value="admin@example.com"></label><label>Password<input id="password" type="password" placeholder="Demo: demo-admin"></label><button id="signIn">Sign in</button><p id="loginMsg" class="error"></p></section><div id="dashboard" class="hidden"><section id="stats" class="stats"></section><section class="card"><div class="toolbar"><input id="search" placeholder="Search KOL"><select id="wave"><option value="">All waves</option><option>Wave 1 · DEMO</option></select><select id="filterStatus"><option value="">All statuses</option><option>Ready to Publish</option><option>Published</option></select><button id="export">Export CSV</button><button id="signOut" class="secondary">Sign out</button></div></section><section class="card table-wrap"><table><thead><tr><th>KOL</th><th>Wave</th><th>Publish at</th><th>Status</th><th>Post URL</th><th>24h Views</th><th>7d Views</th><th>Likes</th><th>Replies</th><th>Reposts</th><th>Source</th><th>Action</th></tr></thead><tbody id="rows"></tbody></table></section></div><dialog id="detail"><button id="close" class="secondary">Close</button><div id="detailBody"></div></dialog></main><script src="js/config-loader.js"></script><script type="module" src="js/admin.js"></script></body></html>
